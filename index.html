<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByteFury AI - Early Access</title>
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@1.0.2/lib/index.umd.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1f2937; overflow-x: hidden; width: 100vw; }

        /* --- SPLASH & INTRO --- */
        #splash-screen { position: fixed; inset: 0; background-color: #f9fafb; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .splash-hidden { transform: translateY(-100%); }
        #intro-page { position: fixed; inset: 0; background: radial-gradient(circle at top right, #eff6ff, #ffffff); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; transition: all 0.5s ease; }
        .intro-hidden { opacity: 0; pointer-events: none; transform: scale(1.02); }

        /* --- SIDEBAR --- */
        #sidebar { transition: transform 0.3s ease; z-index: 60; background-color: #f8fafc; border-right: 1px solid #e2e8f0; }
        .sidebar-closed { transform: translateX(-100%); }

        /* --- RESPONSIVE MARKDOWN --- */
        .markdown-body { line-height: 1.8; font-size: 0.95rem; color: #334155; overflow-wrap: break-word; word-break: break-word; }
        .markdown-body p { margin-bottom: 1.25rem; white-space: pre-wrap; }
        
        /* Table Responsiveness Fix */
        .table-container { width: 100%; overflow-x: auto; margin: 1.5rem 0; border: 1px solid #e2e8f0; border-radius: 8px; -webkit-overflow-scrolling: touch; }
        .markdown-body table { width: 100%; border-collapse: collapse; min-width: 400px; }
        .markdown-body th, .markdown-body td { padding: 10px 14px; border: 1px solid #e2e8f0; text-align: left; }
        .markdown-body th { background-color: #f8fafc; font-weight: 700; }

        /* KaTeX Fix */
        .katex-display { margin: 1rem 0; padding: 1rem; background: #f8fafc; border-radius: 8px; overflow-x: auto; overflow-y: hidden; }

        /* Code Block Fix */
        .code-block-wrapper { margin: 1.5rem 0; border-radius: 12px; overflow: hidden; background: #1e293b; border: 1px solid #334155; max-width: 100%; }
        .code-header { background: #1e293b; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; color: #94a3b8; font-size: 10px; font-family: 'Fira Code', monospace; border-bottom: 1px solid #334155; }
        .markdown-body pre { background: transparent !important; color: #e2e8f0 !important; padding: 1rem; overflow-x: auto; margin: 0; font-family: 'Fira Code', monospace; font-size: 13px; -webkit-overflow-scrolling: touch; }

        /* Bubbles */
        .user-bubble { background-color: #3b82f6; color: white; border-radius: 18px 18px 4px 18px; max-width: 85%; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="splash-screen">
        <div class="flex flex-col items-center gap-2">
            <h1 class="text-3xl font-black tracking-tighter italic">BYTEFURY <span class="text-blue-600 not-italic">AI</span></h1>
            <p class="opacity-50 text-[10px] font-bold tracking-[0.5em] uppercase text-blue-600 italic">Developed ByteFury Studio</p>
        </div>
    </div>

    <div id="intro-page">
        <div class="max-w-xl text-center px-8 flex flex-col items-center">
            <img src="images/logoo.png" alt="Logo" class="w-48 mb-8">
            <p class="text-gray-600 text-sm mb-10 leading-relaxed">
                Platform AI karya anak bangsa oleh <br>
                <span class="text-blue-600 font-bold">Firdy, Carvagie, dan Randy</span>
            </p>
            <button onclick="startApp()" class="w-full max-w-xs bg-blue-600 text-white py-4 rounded-full font-bold shadow-xl active:scale-95 transition-all">Mulai Percakapan</button>
        </div>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 border-r flex flex-col sidebar-closed lg:relative lg:transform-none">
        <div class="p-6 flex flex-col h-full">
            <div class="mb-4 text-gray-400 font-bold text-[10px] uppercase tracking-widest">History</div>
            <button onclick="clearChat()" class="w-full bg-white border border-gray-200 py-2.5 rounded-xl text-[10px] font-bold mb-4">+ Chat Baru</button>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-1"></div>
        </div>
    </aside>

    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 hidden lg:hidden"></div>

    <div id="main-content" class="flex-1 flex flex-col h-full bg-white relative">
        <header class="px-6 py-4 flex items-center border-b bg-white/80 backdrop-blur-md z-40">
            <button id="openSidebar" class="lg:hidden mr-4 text-gray-600 text-xl">☰</button>
            <h1 class="text-md font-black italic uppercase">ByteFury <span class="text-blue-600 not-italic">AI</span></h1>
        </header>

        <main id="chatBox" class="flex-1 overflow-y-auto px-4 md:px-6 py-8 space-y-8 max-w-4xl mx-auto w-full"></main>

        <footer class="p-4 md:p-6 border-t bg-white">
            <div class="max-w-3xl mx-auto flex items-end gap-2">
                <div class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl flex items-center px-4 py-1 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                    <textarea id="userInput" rows="1" class="flex-1 bg-transparent py-2 text-sm focus:outline-none resize-none" placeholder="Tanya sesuatu..."></textarea>
                </div>
                <button id="sendBtn" class="bg-blue-600 text-white p-3.5 rounded-xl shadow-md hover:bg-blue-700 active:scale-90 transition-all">➤</button>
            </div>
        </footer>
    </div>

    <script type="module">
        import OpenAI from 'https://cdn.jsdelivr.net/npm/openai@4.28.0/+esm';
        
        marked.use(markedKatex({ throwOnError: false, output: 'html' }));

        const renderer = new marked.Renderer();
        
        // Perbaikan Renderer Tabel: Menggunakan tag wrapper untuk scroll horizontal
        renderer.table = (header, body) => {
            return `<div class="table-container"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
        };

        // Perbaikan Renderer Code: Menangani objek token (v11.x+)
        renderer.code = function(token) {
            const codeText = typeof token === 'object' ? token.text : arguments[0];
            const lang = (typeof token === 'object' ? token.lang : arguments[1]) || 'code';
            const b64 = btoa(unescape(encodeURIComponent(codeText)));
            
            return `<div class="code-block-wrapper">
                <div class="code-header"><span>${lang}</span>
                    <button onclick="copyCode(this, '${b64}')" class="hover:text-white transition-colors">Copy</button>
                </div>
                <pre><code>${codeText.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
            </div>`;
        };

        marked.setOptions({ renderer, breaks: true, gfm: true });

        // Fungsi Copy Global
        window.copyCode = (btn, b64) => {
            const text = decodeURIComponent(escape(atob(b64)));
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = old, 2000);
            });
        };

        const openai = new OpenAI({
            baseURL: "https://openrouter.ai/api/v1",
            apiKey: "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",
            dangerouslyAllowBrowser: true
        });

        const sysPrompt = { 
            role: "system", 
            content: "Kamu adalah ByteFury AI dikembangkan oleh Firdy Ridho Fillah, Carvagie Adyatma, Randy Mayysa dari ByteFury Studio. Gunakan tabel Markdown untuk perbandingan. Gunakan poin-poin rapi. Gunakan LaTeX untuk rumus matematika. Selalu bertanya di akhir jawaban." 
        };

        let chatHistory = [];
        let savedHistory = JSON.parse(localStorage.getItem('bf_history_v2')) || [];

        window.onload = () => {
            setTimeout(() => document.getElementById('splash-screen').classList.add('splash-hidden'), 2000);
            updateHistoryUI();
        };

        window.startApp = () => {
            document.getElementById('intro-page').classList.add('intro-hidden');
            if (chatBox.children.length === 0) appendMessage('ai', "Halo! Saya **ByteFury AI**. Ada yang bisa saya bantu hari ini?");
        };

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            const loadingId = appendLoading();

            try {
                const completion = await openai.chat.completions.create({
                    model: "arcee-ai/trinity-large-preview:free",
                    messages: [sysPrompt, ...chatHistory, { role: "user", content: text }]
                });
                const aiReply = completion.choices[0].message.content;
                removeLoading(loadingId);
                appendMessage('ai', aiReply);
                chatHistory.push({ role: "user", content: text }, { role: "assistant", content: aiReply });
                saveSession(text);
            } catch (err) {
                removeLoading(loadingId);
                appendMessage('ai', "Maaf, terjadi gangguan koneksi.");
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const wrap = document.createElement('div');
            wrap.className = "flex flex-col " + (role === 'user' ? 'items-end' : 'items-start');
            
            const msg = document.createElement('div');
            msg.className = role === 'user' ? "user-bubble px-4 py-2.5 text-sm shadow-sm" : "markdown-body w-full";
            
            if (role === 'ai') {
                msg.innerHTML = marked.parse(text);
            } else {
                msg.innerText = text;
            }
            
            wrap.appendChild(msg);
            chatBox.appendChild(wrap);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function saveSession(text) {
            if (chatHistory.length === 2) {
                savedHistory.unshift({ id: Date.now(), title: text.substring(0, 30), data: [...chatHistory] });
            } else if (savedHistory.length > 0) {
                savedHistory[0].data = [...chatHistory];
            }
            localStorage.setItem('bf_history_v2', JSON.stringify(savedHistory));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            savedHistory.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = "p-3 text-xs text-gray-600 hover:bg-gray-100 rounded-lg cursor-pointer truncate border-b border-gray-50";
                item.innerText = s.title;
                item.onclick = () => {
                    document.getElementById('chatBox').innerHTML = '';
                    chatHistory = [...s.data];
                    chatHistory.forEach(m => appendMessage(m.role === 'user' ? 'user' : 'ai', m.content));
                };
                list.appendChild(item);
            });
        }

        window.clearChat = () => {
            document.getElementById('chatBox').innerHTML = '';
            chatHistory = [];
            appendMessage('ai', "Sesi baru dimulai.");
        };

        function appendLoading() {
            const id = "L" + Date.now();
            const el = document.createElement('div'); el.id = id;
            el.className = "text-xs text-blue-500 animate-pulse font-bold p-2";
            el.innerText = "ByteFury is typing...";
            document.getElementById('chatBox').appendChild(el);
            return id;
        }

        function removeLoading(id) { document.getElementById(id)?.remove(); }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('userInput').onkeydown = (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        };
        
        // Auto resize textarea
        document.getElementById('userInput').oninput = function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        };

        document.getElementById('openSidebar').onclick = () => { 
            document.getElementById('sidebar').classList.remove('sidebar-closed'); 
            document.getElementById('overlay').classList.remove('hidden'); 
        };
        document.getElementById('overlay').onclick = () => { 
            document.getElementById('sidebar').classList.add('sidebar-closed'); 
            document.getElementById('overlay').classList.add('hidden'); 
        };
    </script>
</body>
</html>
