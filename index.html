<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | ByteFury AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
        }

        /* --- BACKGROUND DECORATION --- */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }
        .circle-1 { width: 400px; height: 400px; background: #dbeafe; top: -100px; right: -50px; }
        .circle-2 { width: 300px; height: 300px; background: #eff6ff; bottom: -50px; left: -50px; }

        /* --- ELEGANT CARD --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03);
            border-radius: 40px;
        }

        .code-pill {
            font-family: 'Fira Code', monospace;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 12px;
            color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* --- ANIMATIONS --- */
        .dot-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .shimmer {
            background: linear-gradient(90deg, #f8fafc 0%, #eff6ff 50%, #f8fafc 100%);
            background-size: 200% 100%;
            animation: shimmer 2.5s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="p-6">

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="max-w-2xl w-full text-center relative">
        <div class="flex justify-center mb-10">
            <div class="code-pill flex items-center gap-3">
                <span class="w-2 h-2 bg-blue-500 rounded-full dot-pulse"></span>
                ByteFury Studio
            </div>
        </div>

        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-slate-900 mb-6">
            Sedang <span class="text-blue-600">Peningkatan.</span>
        </h1>
        
        <p class="text-slate-500 text-lg md:text-xl font-medium max-w-lg mx-auto leading-relaxed mb-12">
            ByteFury AI sedang diperbarui untuk memberikan pengalaman yang lebih cerdas dan cepat.
        </p>

        <div class="glass-card p-10 mb-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400">Core Architecture Status</h2>
                <span class="text-[10px] font-bold text-blue-500">92% SYNCED</span>
            </div>
            
            <div class="grid grid-cols-6 gap-4">
                <div class="h-12 rounded-2xl shimmer"></div>
                <div class="h-12 rounded-2xl bg-blue-50"></div>
                <div class="h-12 rounded-2xl shimmer"></div>
                <div class="h-12 rounded-2xl bg-blue-600"></div>
                <div class="h-12 rounded-2xl shimmer"></div>
                <div class="h-12 rounded-2xl bg-blue-50"></div>
                
                <div class="h-12 rounded-2xl bg-blue-50"></div>
                <div class="h-12 rounded-2xl shimmer"></div>
                <div class="h-12 rounded-2xl bg-blue-100"></div>
                <div class="h-12 rounded-2xl shimmer"></div>
                <div class="h-12 rounded-2xl bg-blue-50"></div>
                <div class="h-12 rounded-2xl shimmer"></div>
            </div>
        </div>

        <div class="space-y-4">
            <p class="text-sm font-semibold text-slate-400 tracking-widest uppercase">
                ByteFury Studio &bull; 2026
            </p>
            <div class="flex justify-center gap-6">
                <div class="h-1 w-12 bg-blue-100 rounded-full"></div>
                <div class="h-1 w-12 bg-blue-600 rounded-full"></div>
                <div class="h-1 w-12 bg-blue-100 rounded-full"></div>
            </div>
        </div>
    </div>

</body>
</html>
